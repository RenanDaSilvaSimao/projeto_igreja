<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membros - Sistema Igreja</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header class="cabecalho">
        <h1>Gerenciar Membros</h1>
        <p>Cadastro de membros da igreja</p>
    </header>

    <nav class="menu">
        <a href="index.html">Início</a>
        <a href="membros.html">Membros</a>
        <a href="eventos.html">Eventos</a>
        <a href="relatorios.html">Relatórios</a>
    </nav>

    <main class="container">

        <section class="boas-vindas">
            <h2>Cadastrar novo membro</h2>
            <p>Preencha os dados abaixo para cadastrar um membro.</p>
        </section>

        <section class="card">
            <form id="form-membro" class="formulario">

                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome do membro">
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" placeholder="Digite o telefone">
                </div>

                <div class="campo">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" name="cargo" placeholder="Ex: Pastor, Líder, Membro">
                </div>

                <div class="campo">
                    <label for="status">Status</label>
                    <select id="status" name="status">
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>

                <button type="submit">Cadastrar membro</button>

            </form>

            <div id="mensagem" class="mensagem"></div>
        </section>

    </main>

</body>
</html>
